<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#153b2d">
  <title>VERA — Histórico Recuperado | Enecol Centro</title>
  <style>
    :root{--bg:#f3f7f4;--card:#fff;--ink:#153b2d;--muted:#61756b;--line:#d6e1da;--today:#0e7a56;--yesterday:#2962a3;--danger:#a93434;--shadow:0 12px 32px rgba(13,50,38,.10)}
    *{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif}.wrap{max-width:1180px;margin:0 auto;padding:20px 16px 48px}.hero{padding:22px 20px;border-radius:18px;background:linear-gradient(135deg,#153b2d,#285a43);color:#fff;box-shadow:var(--shadow)}h1{font-size:23px;margin:0 0 8px;line-height:1.18}.subtitle{margin:0;color:#dcebe2;line-height:1.45;font-size:14px}.summary{display:flex;gap:10px;flex-wrap:wrap;margin-top:15px}.chip{padding:8px 10px;border:1px solid rgba(255,255,255,.22);border-radius:999px;background:rgba(255,255,255,.10);font-size:12px;font-weight:700}.toolbar{margin:16px 0;display:grid;grid-template-columns:1fr auto;gap:10px}.search{width:100%;padding:12px 13px;border:1px solid var(--line);border-radius:11px;background:#fff;color:var(--ink);font:inherit;box-shadow:0 2px 10px rgba(13,50,38,.04)}.filters{display:flex;gap:8px;flex-wrap:wrap}.filter{padding:11px 12px;border:1px solid var(--line);border-radius:10px;background:#fff;color:var(--ink);font:700 12px inherit;cursor:pointer}.filter.active{background:var(--ink);color:#fff;border-color:var(--ink)}.status{font-size:13px;color:var(--muted);padding:8px 2px 14px}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(285px,1fr));gap:12px}.card{background:var(--card);border:1px solid var(--line);border-radius:15px;padding:14px;box-shadow:0 5px 18px rgba(13,50,38,.055)}.card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}.lot{font-size:11px;font-weight:800;letter-spacing:.03em}.lot.yesterday{color:var(--yesterday)}.lot.today{color:var(--today)}.id{font-size:18px;font-weight:800;margin-top:3px}.time{font-size:12px;color:var(--muted);text-align:right;line-height:1.35}.species{font-size:15px;font-weight:750;margin:12px 0 9px}.facts{display:grid;grid-template-columns:1fr 1fr;gap:7px}.fact{border-radius:9px;background:#f7faf8;padding:8px}.fact span{display:block;font-size:10px;font-weight:800;letter-spacing:.04em;color:var(--muted);margin-bottom:3px}.fact strong{font-size:13px;color:var(--ink)}.actions{display:flex;gap:8px;margin-top:12px}.btn{flex:1;padding:10px;border:1px solid var(--line);border-radius:9px;background:#fff;color:var(--ink);font:700 12px inherit;text-decoration:none;text-align:center;cursor:pointer}.btn.primary{background:var(--ink);border-color:var(--ink);color:#fff}.empty,.error{padding:20px;border:1px dashed var(--line);border-radius:13px;background:#fff;color:var(--muted);text-align:center}.error{color:var(--danger);border-color:#e4bbbb}.modal{position:fixed;inset:0;z-index:20;display:none;align-items:flex-end;justify-content:center;background:rgba(8,27,20,.62);padding:12px}.modal.open{display:flex}.modal-box{width:min(700px,100%);max-height:92vh;overflow:auto;background:#fff;border-radius:18px 18px 14px 14px;padding:15px;box-shadow:0 14px 42px rgba(0,0,0,.28)}.modal-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:12px}.modal-head h2{font-size:17px;margin:0}.close{padding:8px 10px;border:1px solid var(--line);border-radius:8px;background:#fff;font:700 13px inherit;cursor:pointer}.photos{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.photo{display:block;border-radius:10px;overflow:hidden;background:#edf2ef;aspect-ratio:3/4}.photo img{width:100%;height:100%;object-fit:cover;display:block}.modal-meta{font-size:13px;color:var(--muted);margin:0 0 10px;line-height:1.45}@media(max-width:650px){.wrap{padding:14px 12px 36px}.toolbar{grid-template-columns:1fr}.filters{overflow:auto;flex-wrap:nowrap;padding-bottom:2px}.filter{white-space:nowrap}.photos{grid-template-columns:1fr}.photo{aspect-ratio:4/5}.hero{padding:18px 16px}h1{font-size:21px}}
  </style>
</head>
<body>
  <main class="wrap">
    <section class="hero">
      <h1>Histórico recuperado — Enecol Centro</h1>
      <p class="subtitle">Visualização separada dos lotes preservados. Os IDs repetidos foram mantidos como registros distintos por data e lote.</p>
      <div class="summary"><span class="chip">30/06/2026 · 23 pontos</span><span class="chip">01/07/2026 · 48 pontos</span><span class="chip">Total preservado · 71 pontos</span><span class="chip">3 fotos por ponto</span></div>
    </section>

    <section class="toolbar" aria-label="Filtros do histórico">
      <input class="search" id="search" type="search" placeholder="Buscar por ID, poste, espécie ou data">
      <div class="filters">
        <button class="filter active" data-filter="all">Todos · 71</button>
        <button class="filter" data-filter="yesterday">30/06 · 23</button>
        <button class="filter" data-filter="today">01/07 · 48</button>
      </div>
    </section>

    <div class="status" id="status">Carregando os 71 registros preservados…</div>
    <section class="grid" id="grid" aria-live="polite"></section>
  </main>

  <div class="modal" id="modal" role="dialog" aria-modal="true" aria-label="Fotos do ponto">
    <section class="modal-box">
      <div class="modal-head"><h2 id="modal-title">Fotos</h2><button class="close" id="close">Fechar</button></div>
      <p class="modal-meta" id="modal-meta"></p>
      <div class="photos" id="photos"></div>
    </section>
  </div>

  <script>
  (function(){
    const repo = 'LGRSV/vera-vegetacao';
    const lotes = [
      {key:'yesterday', label:'30/06/2026', short:'30/06', count:23, branch:'backup/enecol-centro-2026-06-30'},
      {key:'today', label:'01/07/2026', short:'01/07', count:48, branch:'backup/enecol-centro-2026-07-01-48-pontos'}
    ];
    const grid = document.getElementById('grid');
    const status = document.getElementById('status');
    const search = document.getElementById('search');
    const modal = document.getElementById('modal');
    const modalTitle = document.getElementById('modal-title');
    const modalMeta = document.getElementById('modal-meta');
    const photos = document.getElementById('photos');
    const close = document.getElementById('close');
    let filtro = 'all';
    let registros = [];

    function pad(n){ return String(n).padStart(4,'0'); }
    function raw(branch,path){ return 'https://raw.githubusercontent.com/' + repo + '/' + branch + '/' + path; }
    function esc(v){ return String(v == null ? '' : v).replace(/[&<>'"]/g,function(c){ return ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'})[c]; }); }
    function normalizar(lote,ponto){ return Object.assign({},ponto,{lote:lote, chave:lote.key + '-' + ponto.id, fotos:(ponto.fotos_github || []).map(function(p){ return raw(lote.branch,p); })}); }
    function textoBusca(r){ return [r.lote.label,r.id,r.poste,r.especie,r.data,r.projeto,r.area,r.acesso].join(' ').toLowerCase(); }

    async function carregarLote(lote){
      const promessas = [];
      for(let n=1;n<=lote.count;n++){
        const path = 'dados/Enecol-Centro/V' + pad(n) + '.json';
        promessas.push(fetch(raw(lote.branch,path),{cache:'no-store'}).then(function(res){ if(!res.ok) throw new Error(path + ' · HTTP ' + res.status); return res.json(); }).then(function(p){ return normalizar(lote,p); }));
      }
      const resposta = await Promise.allSettled(promessas);
      const ok = resposta.filter(function(x){ return x.status === 'fulfilled'; }).map(function(x){ return x.value; });
      const falhas = resposta.filter(function(x){ return x.status === 'rejected'; });
      return {ok:ok,falhas:falhas};
    }

    function abrirFotos(chave){
      const r = registros.find(function(item){ return item.chave === chave; });
      if(!r) return;
      modalTitle.textContent = r.lote.label + ' · ' + r.id + ' · ' + (r.especie || 'Sem espécie');
      modalMeta.textContent = 'Poste ' + (r.poste || 'não informado') + ' · ' + (r.projeto || 'Projeto sem nome') + ' · ' + (r.fotos.length || 0) + ' foto(s) recuperada(s).';
      photos.innerHTML = r.fotos.map(function(url,i){ return '<a class="photo" href="' + esc(url) + '" target="_blank" rel="noopener"><img loading="lazy" src="' + esc(url) + '" alt="Foto ' + (i+1) + ' do ponto ' + esc(r.id) + '"></a>'; }).join('') || '<div class="empty">Nenhuma foto registrada para este ponto.</div>';
      modal.classList.add('open');
    }

    function render(){
      const termo = search.value.trim().toLowerCase();
      const lista = registros.filter(function(r){ return (filtro === 'all' || r.lote.key === filtro) && (!termo || textoBusca(r).includes(termo)); });
      status.textContent = lista.length + ' ponto(s) exibido(s)' + (filtro === 'all' ? ' dos 71 preservados.' : ' no lote de ' + (filtro === 'today' ? '01/07/2026.' : '30/06/2026.'));
      if(!lista.length){ grid.innerHTML = '<div class="empty">Nenhum registro encontrado com esse filtro.</div>'; return; }
      grid.innerHTML = lista.map(function(r){
        const loteClass = r.lote.key === 'today' ? 'today' : 'yesterday';
        const maps = 'https://www.google.com/maps?q=' + encodeURIComponent(r.lat + ',' + r.lon);
        return '<article class="card">'
          + '<div class="card-top"><div><div class="lot ' + loteClass + '">' + esc(r.lote.label) + ' · LOTE PRESERVADO</div><div class="id">' + esc(r.id) + '</div></div><div class="time">' + esc(r.data || 'Data não informada') + '</div></div>'
          + '<div class="species">' + esc(r.especie || 'Sem espécie') + '</div>'
          + '<div class="facts"><div class="fact"><span>POSTE</span><strong>' + esc(r.poste || '—') + '</strong></div><div class="fact"><span>ÁREA</span><strong>' + esc(r.area || '—') + '</strong></div><div class="fact"><span>ALTURA</span><strong>' + esc(r.altura || '—') + ' m</strong></div><div class="fact"><span>ACESSO</span><strong>' + esc(r.acesso || '—') + '</strong></div><div class="fact"><span>DT BT / MT</span><strong>' + esc(r.dtbt || '—') + ' / ' + esc(r.dtmt || '—') + ' cm</strong></div><div class="fact"><span>DT AT / DAP</span><strong>' + esc(r.dtat || '—') + ' / ' + esc(r.dap || '—') + ' cm</strong></div></div>'
          + '<div class="actions"><button class="btn primary" data-photos="' + esc(r.chave) + '">Ver ' + (r.fotos.length || 0) + ' fotos</button><a class="btn" href="' + esc(maps) + '" target="_blank" rel="noopener">Localização</a></div>'
          + '</article>';
      }).join('');
      grid.querySelectorAll('[data-photos]').forEach(function(btn){ btn.addEventListener('click',function(){ abrirFotos(btn.getAttribute('data-photos')); }); });
    }

    document.querySelectorAll('.filter').forEach(function(btn){ btn.addEventListener('click',function(){ filtro = btn.getAttribute('data-filter'); document.querySelectorAll('.filter').forEach(function(b){ b.classList.toggle('active',b === btn); }); render(); }); });
    search.addEventListener('input',render);
    close.addEventListener('click',function(){ modal.classList.remove('open'); });
    modal.addEventListener('click',function(e){ if(e.target === modal) modal.classList.remove('open'); });

    Promise.all(lotes.map(carregarLote)).then(function(resultados){
      registros = resultados.flatMap(function(r){ return r.ok; }).sort(function(a,b){ if(a.lote.key !== b.lote.key) return a.lote.key === 'yesterday' ? -1 : 1; return a.id.localeCompare(b.id); });
      const falhas = resultados.flatMap(function(r){ return r.falhas; });
      if(falhas.length){ status.textContent = registros.length + ' ponto(s) carregado(s). ' + falhas.length + ' arquivo(s) não responderam; atualize a página para tentar novamente.'; }
      render();
    }).catch(function(erro){ grid.innerHTML = '<div class="error">Não foi possível carregar o histórico agora. Verifique a conexão e atualize a página.</div>'; status.textContent = String(erro && erro.message ? erro.message : erro); });
  })();
  </script>
</body>
</html>
