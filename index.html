<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#1a2e1a">
  <title>VERA — Vegetação em Rede Ativa</title>
  <style>
    :root{color-scheme:light;--verde:#1a2e1a;--fundo:#f5f7f2;--texto:#1a2e1a;--muted:#5a7a55;}
    *{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px;background:var(--fundo);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;color:var(--texto)}
    main{width:min(100%,390px);padding:28px 24px;border-radius:16px;background:#fff;box-shadow:0 12px 36px rgba(26,46,26,.16);text-align:center}.mark{width:48px;height:48px;display:grid;place-items:center;margin:0 auto 14px;border-radius:12px;background:var(--verde);color:#fff;font-size:22px;font-weight:800}.status{font-size:14px;line-height:1.45;color:var(--muted)}.error{display:none;margin-top:14px;padding:12px;border-radius:10px;background:#fdecea;color:#8f261d;text-align:left;font-size:13px;line-height:1.45}.error code{display:block;margin-top:8px;word-break:break-word;font-size:11px}
  </style>
</head>
<body>
  <main>
    <div class="mark">V</div>
    <strong>Carregando VERA 2.6.11</strong>
    <p id="status" class="status">Preparando projeto compartilhado por equipe…</p>
    <div id="error" class="error"><strong>Não foi possível iniciar o VERA.</strong><br>Verifique a conexão e atualize a página.<code id="error-detail"></code></div>
  </main>
  <script>
  (async function(){
    const status = document.getElementById('status');
    const errorBox = document.getElementById('error');
    const errorDetail = document.getElementById('error-detail');
    const source = 'https://raw.githubusercontent.com/LGRSV/vera-vegetacao/backup/v2.6.8-antes-admin-fotos-renomeacao-20260626/index.html';
    try {
      const response = await fetch(source + '?team-state=2.6.11', { cache: 'no-store' });
      if (!response.ok) throw new Error('Versão estável indisponível (' + response.status + ').');
      let html = await response.text();
      html = html.replaceAll('2.6.8', '2.6.11');
      html = html.replace('</body>', '<script src="estado-equipes.js?v=2.6.11"><\/script></body>');
      document.open();
      document.write(html);
      document.close();
    } catch (error) {
      status.textContent = 'A inicialização foi interrompida para preservar os dados.';
      errorBox.style.display = 'block';
      errorDetail.textContent = String(error && error.message ? error.message : error);
      console.error('VERA team state:', error);
    }
  })();
  </script>
</body>
</html>
