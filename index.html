<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#1a2e1a">
  <title>VERA — Vegetação em Rede Ativa</title>
  <style>
    :root{color-scheme:light;--verde:#1a2e1a;--verde-medio:#2d5a27;--fundo:#f5f7f2;--texto:#1a2e1a;--muted:#5a7a55;}
    *{box-sizing:border-box} body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px;background:var(--fundo);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;color:var(--texto)}
    main{width:min(100%,390px);padding:28px 24px;border-radius:16px;background:#fff;box-shadow:0 12px 36px rgba(26,46,26,.16);text-align:center}
    .mark{width:48px;height:48px;display:grid;place-items:center;margin:0 auto 14px;border-radius:12px;background:var(--verde);color:#fff;font-size:22px;font-weight:800}.status{font-size:14px;line-height:1.45;color:var(--muted)}
    .error{display:none;margin-top:14px;padding:12px;border-radius:10px;background:#fdecea;color:#8f261d;text-align:left;font-size:13px;line-height:1.45}.error code{display:block;margin-top:8px;word-break:break-word;font-size:11px}
  </style>
</head>
<body>
  <main>
    <div class="mark">V</div>
    <strong>Carregando VERA 2.6.6</strong>
    <p class="status" id="status">Preparando regras de coleta em campo…</p>
    <div class="error" id="error"><strong>Não foi possível iniciar o VERA.</strong><br>Verifique a conexão e atualize a página.<code id="error-detail"></code></div>
  </main>
  <script>
  (async function iniciarVera(){
    'use strict';
    const SOURCE_URL = 'https://raw.githubusercontent.com/LGRSV/vera-vegetacao/backup/v2.6.4-antes-validacoes-20260626/index.html';
    const status = document.getElementById('status');
    const errorBox = document.getElementById('error');
    const errorDetail = document.getElementById('error-detail');

    function substituirUmaVez(html, procurar, substituir, nome){
      const primeira = html.indexOf(procurar);
      if (primeira < 0) throw new Error('Trecho não encontrado: ' + nome + '.');
      if (html.indexOf(procurar, primeira + procurar.length) >= 0) throw new Error('Trecho duplicado: ' + nome + '.');
      return html.slice(0, primeira) + substituir + html.slice(primeira + procurar.length);
    }

    try {
      status.textContent = 'Carregando a versão protegida e aplicando as validações…';
      const response = await fetch(SOURCE_URL + '?v=2.6.6', { cache: 'no-store' });
      if (!response.ok) throw new Error('Backup indisponível (' + response.status + ').');
      let html = await response.text();

      html = substituirUmaVez(
        html,
        "for (let d = 0; d <= 300; d += 5) sel.innerHTML += '<option value=\"' + d + '\">' + d + ' cm</option>';",
        "for (let d = 0; d <= 300; d += 50) sel.innerHTML += '<option value=\"' + d + '\">' + d + ' cm</option>';",
        'incremento de distância'
      );

      html = substituirUmaVez(
        html,
        '<div class="photo-label">Toque para fotografar ou escolher da galeria</div>',
        '<div class="photo-label">Adicione no mínimo 3 fotos obrigatórias.</div>\n       <div id="photo-requirement" style="font-size:11px;color:var(--danger);font-weight:600;margin-top:6px;line-height:1.4;" aria-live="polite">0 de 3 fotos adicionadas — registre frente, lateral e a proximidade com a rede.</div>',
        'aviso de fotos'
      );

      html = substituirUmaVez(
        html,
        "    c.appendChild(div);\n  });\n}\n\nfunction removePhoto(i)",
        "    c.appendChild(div);\n  });\n  const requirement = document.getElementById('photo-requirement');\n  if (requirement) {\n    const completas = photos.length >= 3;\n    requirement.textContent = completas\n      ? photos.length + ' foto(s) adicionada(s) — evidências completas.'\n      : photos.length + ' de 3 fotos adicionadas — registre frente, lateral e a proximidade com a rede.';\n    requirement.style.color = completas ? 'var(--green-mid)' : 'var(--danger)';\n  }\n}\n\nfunction removePhoto(i)",
        'contador de fotos'
      );

      html = substituirUmaVez(
        html,
        "  if (!especie) { showToast('Informe a espécie da árvore!','error'); return; }\n\n  const all = await dbGetAll('points');",
        "  if (!especie) { showToast('Informe a espécie da árvore!','error'); return; }\n  if (photos.length < 3) {\n    const faltam = 3 - photos.length;\n    showToast('Adicione 3 fotos obrigatórias: frente, lateral e proximidade com a rede. Faltam ' + faltam + '.', 'error');\n    return;\n  }\n\n  const all = await dbGetAll('points');",
        'bloqueio de registro sem fotos'
      );

      html = substituirUmaVez(
        html,
        "const APP_VERSION = '2.6.4';",
        "const APP_VERSION = '2.6.6';",
        'versão interna'
      );
      html = html.replace(/v2\.6\.4/g, 'v2.6.6');

      html = substituirUmaVez(
        html,
        '<div style="font-size:10px;color:var(--text-muted);margin-top:4px;letter-spacing:0.08em;">v2.6.6</div>',
        '<div style="display:inline-flex;align-items:center;margin-top:10px;padding:4px 10px;border:1px solid var(--border);border-radius:999px;background:var(--off-white);font-size:10px;font-weight:800;color:var(--green-mid);letter-spacing:0.08em;">VERSÃO 2.6.6</div>',
        'selo de versão na tela de login'
      );

      html = substituirUmaVez(
        html,
        "function salvarSessao() {\n  try {\n    const sessao = {\n      user: currentUser,\n      polo: poloAtivo,\n      alimentadores: alimentadoresAtivos,\n      ts: Date.now(),\n    };\n    localStorage.setItem(SESSAO_KEY, JSON.stringify(sessao));\n  } catch(e) {}\n}",
        "function salvarSessao() {\n  try {\n    const sessao = {\n      user: currentUser,\n      rotaId: rotaAtribuida ? String(rotaAtribuida.id) : null,\n      ts: Date.now(),\n    };\n    localStorage.setItem(SESSAO_KEY, JSON.stringify(sessao));\n  } catch(e) {}\n}",
        'sessão vinculada ao projeto atribuído'
      );

      html = substituirUmaVez(
        html,
        "  // EQUIPE DE CAMPO com alimentadores ativos\n  if (sessao.polo && Array.isArray(sessao.alimentadores) && sessao.alimentadores.length) {\n    poloAtivo = sessao.polo;\n    alimentadoresAtivos = sessao.alimentadores;\n    await carregarIndice();\n    await confirmarAlimentadores();\n    return true;\n  }\n\n  // Equipe sem rota escolhida — volta pra seleção de polo\n  document.getElementById('polo-screen').style.display  = 'flex';\n  document.getElementById('polo-user-label').textContent = sessao.user;\n  carregarIndice();\n  mostrarRotaAtribuida(sessao.user);\n  return true;",
        "  // EQUIPE DE CAMPO: somente projetos atribuídos pelo supervisor\n  if (sessao.rotaId) {\n    await carregarRotas();\n    const rotaRestaurada = (rotasData.rotas || []).find(r =>\n      r && String(r.id) === String(sessao.rotaId) && r.equipe === currentUser\n    );\n    if (rotaRestaurada) {\n      rotaAtribuida = rotaRestaurada;\n      poloAtivo = rotaRestaurada.polo;\n      alimentadoresAtivos = [...rotaRestaurada.alimentadores];\n      await carregarIndice();\n      await confirmarAlimentadores();\n      return true;\n    }\n  }\n\n  // Sessões antigas ou projetos removidos não podem manter rota manual.\n  limparSessao();\n  document.getElementById('polo-screen').style.display = 'flex';\n  document.getElementById('polo-user-label').textContent = sessao.user;\n  carregarIndice();\n  mostrarRotaAtribuida(sessao.user);\n  return true;",
        'restauração restrita a projeto atribuído'
      );

      html = substituirUmaVez(
        html,
        '<p>O supervisor ainda não definiu sua rota.<br>Você pode selecionar os alimentadores manualmente abaixo.</p>',
        '<p>O supervisor ainda não definiu um projeto para esta equipe.<br>Aguarde a atribuição para iniciar a coleta.</p>',
        'aviso sem projeto atribuído'
      );

      html = substituirUmaVez(
        html,
        'async function mostrarRotaAtribuida(user) {',
        "function bloquearSelecaoManualRota() {\n  const card = document.querySelector('#polo-screen .polo-card');\n  if (!card) return;\n  Array.from(card.children).forEach(el => {\n    if (el.id === 'rota-atribuida-banner' || el.id === 'sem-rota-banner') return;\n    el.style.display = 'none';\n  });\n}\n\nasync function mostrarRotaAtribuida(user) {\n  bloquearSelecaoManualRota();",
        'bloqueio da seleção manual de rota'
      );

      document.open();
      document.write(html);
      document.close();
    } catch (error) {
      status.textContent = 'A inicialização foi interrompida para preservar os dados.';
      errorBox.style.display = 'block';
      errorDetail.textContent = String(error && error.message ? error.message : error);
      console.error('VERA bootstrap:', error);
    }
  })();
  </script>
</body>
</html>
